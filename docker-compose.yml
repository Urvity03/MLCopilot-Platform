name: mlcopilot

x-api-env: &api-env
  DATABASE_URL: postgresql+asyncpg://mlcopilot:mlcopilot@postgres:5432/mlcopilot
  REDIS_URL: redis://redis:6379/0
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: mlcopilot-dev
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: mlcopilot
  MINIO_SECRET_KEY: mlcopilot-dev-secret
  MINIO_SECURE: "false"
  MINIO_BUCKET: mlcopilot
  JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-in-production-0000}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-}
  ENVIRONMENT: development
  CORS_ORIGINS: http://localhost:3000

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: apps/api
    command: uvicorn mlcopilot.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: apps/api
    command: celery -A mlcopilot.workers.celery_app:celery_app worker -Q embeddings,parsing,graph,investigations,integrations,analysis --loglevel=info
    environment: *api-env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      disable: true

  beat:
    build:
      context: apps/api
    command: celery -A mlcopilot.workers.celery_app:celery_app beat --loglevel=info
    environment: *api-env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      disable: true

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mlcopilot
      POSTGRES_PASSWORD: mlcopilot
      POSTGRES_DB: mlcopilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlcopilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/mlcopilot-dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mlcopilot
      MINIO_ROOT_PASSWORD: mlcopilot-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 mlcopilot mlcopilot-dev-secret;
      mc mb --ignore-existing local/mlcopilot;
      exit 0;
      "

volumes:
  postgres-data:
  neo4j-data:
  redis-data:
  minio-data:
